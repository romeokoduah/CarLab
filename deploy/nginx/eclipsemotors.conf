# Eclipse Motors — nginx vhost (deployed on Contabo, /etc/nginx/sites-available/eclipsemotors)
# Reference copy of the live server config. Phase 2: reverse-proxy to the Node
# app (pm2 "eclipse-motors" on :3001), uploads served from disk, security
# headers, Let's Encrypt SSL. Admin auth is enforced by the app (no Basic Auth).

server {
    server_name eclipsemotors.org www.eclipsemotors.org;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: https://images.unsplash.com https://plus.unsplash.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self' 'unsafe-inline'; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'" always;

    client_max_body_size 10m;

    # Uploaded car photos, served straight from disk (UPLOAD_DIR).
    location /uploads/ {
        alias /var/www/eclipse-uploads/;
        expires 30d;
        access_log off;
    }

    # Everything else -> the Node app (pm2). Admin auth is enforced by the app.
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/eclipsemotors.org/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/eclipsemotors.org/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}
server {
    if ($host = www.eclipsemotors.org) { return 301 https://$host$request_uri; }
    if ($host = eclipsemotors.org) { return 301 https://$host$request_uri; }
    listen 80;
    listen [::]:80;
    server_name eclipsemotors.org www.eclipsemotors.org;
    return 404;
}
