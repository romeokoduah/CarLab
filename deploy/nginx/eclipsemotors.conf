# Eclipse Motors — nginx vhost (deployed on Contabo, /etc/nginx/sites-available/eclipsemotors)
# Reference copy of the live server config. Phase 1: static export + security
# headers + Basic-Auth-gated /admin. Phase 2 will replace the static root with a
# reverse proxy to the Node app (pm2 :3001).
#
# Admin Basic Auth users live in /etc/nginx/.htpasswd-eclipse-admin (not in git):
#   htpasswd -c /etc/nginx/.htpasswd-eclipse-admin <user>

server {
    server_name eclipsemotors.org www.eclipsemotors.org;

    root /var/www/CarLab/out;
    index index.html;

    # ── Security headers (apply to document responses) ──
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: https://images.unsplash.com https://plus.unsplash.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self' 'unsafe-inline'; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'" always;

    location /_next/static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Admin: real server-side gate (nginx Basic Auth). Not indexable.
    location /admin {
        auth_basic "Eclipse Motors Admin";
        auth_basic_user_file /etc/nginx/.htpasswd-eclipse-admin;
        try_files $uri $uri/ $uri.html /admin/index.html;
    }

    location /car/ {
        try_files $uri $uri/ /car/_view/index.html;
    }

    location / {
        try_files $uri $uri/ $uri.html /404.html;
    }

    error_page 404 /404.html;

    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/eclipsemotors.org/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/eclipsemotors.org/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}
server {
    if ($host = www.eclipsemotors.org) { return 301 https://$host$request_uri; } # managed by Certbot
    if ($host = eclipsemotors.org) { return 301 https://$host$request_uri; } # managed by Certbot

    listen 80;
    listen [::]:80;
    server_name eclipsemotors.org www.eclipsemotors.org;
    return 404; # managed by Certbot
}
