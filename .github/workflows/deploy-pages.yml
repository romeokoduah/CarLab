name: Deploy to GitHub Pages

on:
  # Deploys on every push to the default branch.
  push:
    branches: [main]
  # Allows manual runs from the Actions tab.
  workflow_dispatch:

# Permissions required by the Pages deploy actions.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure Pages
        # enablement: true turns on GitHub Pages (Actions source) automatically
        # on the first run, so no manual toggling is needed.
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Build static export
        env:
          GITHUB_PAGES: "true"
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
